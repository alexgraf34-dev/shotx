<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="portrait">
    <title>ShotX | ENDURE Systems</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --panel: #121212; --border: #2a2a2a; --red: #ff0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { background: var(--bg); }
        body { color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100dvh; overflow: hidden; }
        
        .display { background: linear-gradient(180deg, #000 0%, #111 100%); padding: 25px 20px; border-bottom: 2px solid var(--border); text-align: center; }
        #timer { font-size: 5.5rem; color: var(--red); font-family: monospace; text-shadow: 0 0 15px rgba(255,0,0,0.5); margin: 0; font-weight: bold; }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-val { font-size: 1.3rem; color: #fff; font-weight: bold; display: block; }
        .stat-label { font-size: 0.65rem; color: #666; text-transform: uppercase; }

        .controls { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: var(--panel); }
        .group { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: bold; }
        
        select, input { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 5px; font-size: 1rem; margin-bottom: 5px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        #calib-btn { background: #1a0000; border: 1px solid #400; color: #ff3333; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
        #calib-btn.active { background: #ff0000; color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .footer { padding: 15px; background: #000; border-top: 1px solid var(--border); }
        .main-btn { height: 80px; background: radial-gradient(circle, #f22, #800); border: none; border-radius: 10px; color: #fff; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 0 #400; width: 100%; margin-bottom: 12px; }
        .secondary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-s { background: #222; border: 1px solid #333; color: #ccc; padding: 12px; font-size: 0.7rem; border-radius: 5px; text-transform: uppercase; font-weight: bold; }

        .overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: rgba(5,5,5,0.96); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 24px; }
        #save-mode-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9998; display: none; align-items: center; justify-content: center; color: #111; }
        #log { background: #000; border: 1px solid #222; height: 100px; overflow-y: auto; font-family: monospace; padding: 10px; font-size: 0.85rem; margin-top: 10px; }
        .log-entry { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 4px 0; }
    </style>
</head>
<body>

<div id="auth-overlay" class="overlay">
    <h1 style="color:red; letter-spacing:8px; margin-bottom:10px;">SHOTX</h1>
    <p style="max-width:520px; text-align:center; color:#aaa; line-height:1.4; margin:0 0 16px;">
        Hinweis: Diese Sperre schützt nur lokal auf dem Gerät. Für echte Sicherheit ist Server-Authentifizierung erforderlich.
    </p>
    <div id="phase-setup" style="width:100%; max-width:520px; text-align:center;">
        <label class="label">Lokale App-PIN setzen (optional)</label>
        <input type="password" id="new-pass" placeholder="PIN / Passwort" style="margin-bottom:10px;">
        <input type="password" id="new-pass-confirm" placeholder="Bestätigen">
        <button class="main-btn" style="height:60px; font-size:1.1rem; margin-top:8px;" onclick="setFinalPassword()">PIN Speichern</button>
        <button class="btn-s" style="width:100%; margin-top:10px;" onclick="skipLocalLock()">Ohne PIN fortfahren</button>
    </div>
    <div id="phase-login" style="width:100%; max-width:520px; text-align:center; display:none;">
        <label class="label">Lokale App entsperren</label>
        <input type="password" id="login-pass" placeholder="PIN / Passwort" style="text-align:center;">
        <button class="main-btn" style="height:60px; font-size:1.2rem; margin-top:15px;" onclick="validateLogin()">Login</button>
        <button class="btn-s" style="width:100%; margin-top:10px;" onclick="resetLocalLock()">Lokale PIN zurücksetzen</button>
    </div>
</div>

<div class="display" id="main-display">
    <div id="timer">0.000</div>
    <div class="stats">
        <div class="stat-item"><span class="stat-label">Shot</span><span class="stat-val" id="val-count">0</span></div>
        <div class="stat-item"><span class="stat-label">Split</span><span class="stat-val" id="val-split">0.00</span></div>
        <div class="stat-item"><span class="stat-label">Par</span><span class="stat-val" id="val-par">OFF</span></div>
    </div>
</div>

<div class="controls">
    <div class="group">
        <label class="label">Acoustic Profiling</label>
        <select id="calib-weapon">
            <option value="pistol">Pistol (9mm/.45)</option>
            <option value="rifle">Rifle (.223/.308)</option>
            <option value="pcc">PCC / Rimfire</option>
        </select>
        <button id="calib-btn" onclick="startCalibration()">START CALIBRATION</button>
    </div>
    <div class="group">
        <div class="row">
            <div class="col"><label class="label">Threshold</label><input type="range" id="sens" min="50" max="98" value="58"></div>
            <div class="col" style="flex:0.3; text-align:right;"><span id="sens-txt" style="color:red; font-weight:bold;">85%</span></div>
        </div>
    </div>
    <div class="group">
        <div class="row">
            <div class="col"><label class="label">Par (s)</label><input type="number" id="par-in" value="0" step="0.1"></div>
            <div class="col"><label class="label">Delay (s)</label><input type="number" id="delay-in" value="4" step="0.5"></div>
        </div>
    </div>
    
    <div class="group">
        <div class="row">
            <div class="col"><label class="label">Echo Filter (ms)</label><input type="range" id="echo-filter" min="60" max="350" value="120"></div>
            <div class="col" style="flex:0.4; text-align:right;"><span id="echo-filter-txt" style="color:red; font-weight:bold;">120 ms</span></div>
        </div>
    </div>
    <div class="group">
        <div class="row">
            <div class="col"><label class="label">Voice Ansage</label><input type="checkbox" id="voice-toggle" checked></div>
            <div class="col"><label class="label">Voice Ctrl (Stand-By/Time)</label><input type="checkbox" id="voice-ctrl-toggle"></div>
        </div>
    </div>

    <div id="log"></div>
</div>

<div class="footer">
    <button id="main-action" class="main-btn">Stand By</button>
    <div class="secondary-grid">
        <button onclick="exportQR()" class="btn-s">QR</button>
        <button onclick="exportCSV()" class="btn-s">CSV</button>
        <button onclick="resetCurrentRun()" class="btn-s">Reset</button>
        <button onclick="clearAllTimes()" class="btn-s">Clear All</button>
    </div>
</div>

<div id="save-mode-overlay" onclick="toggleSaveMode(false)">RANGE MODE ACTIVE</div>
<div id="qr-overlay" class="overlay" style="display:none;" onclick="this.style.display='none'"><div id="qrcode"></div></div>

<script src="app.js"></script>
</body>
</html>
